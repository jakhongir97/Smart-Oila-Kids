name: Release Readiness Gates

on:
  workflow_dispatch:
  push:
    paths:
      - "SmartOilaKids/**"
      - "SmartOilaKidsTests/**"
      - "Shared/**"
      - "SmartOilaKidsScheduleMonitorExtension/**"
      - "SmartOilaKidsUsageReportExtension/**"
      - "SmartOilaKids.xcodeproj/**"
      - "OpenAPI/**"
      - "scripts/**"
      - ".github/workflows/release-readiness-gates.yml"
  pull_request:
    paths:
      - "SmartOilaKids/**"
      - "SmartOilaKidsTests/**"
      - "Shared/**"
      - "SmartOilaKidsScheduleMonitorExtension/**"
      - "SmartOilaKidsUsageReportExtension/**"
      - "SmartOilaKids.xcodeproj/**"
      - "OpenAPI/**"
      - "scripts/**"
      - ".github/workflows/release-readiness-gates.yml"

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run release readiness checks
        run: ./scripts/run_release_readiness_checks.sh

  ios-release-readiness:
    needs: release-readiness
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Print Xcode Version
        run: xcodebuild -version

      - name: List Available iOS Simulators
        run: xcrun simctl list devices available

      - name: Run macOS Release Readiness Checks
        run: ./scripts/run_release_readiness_checks.sh
        env:
          RUN_IOS_SIMULATOR_TESTS: "1"

      - name: Upload Xcode Result Bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartoila-release-readiness-xcresult
          path: .build/test-results/SmartOilaKids.xcresult
          if-no-files-found: ignore

      - name: Upload Xcodebuild Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartoila-release-readiness-xcodebuild-log
          path: .build/test-results/ios-tests.log
          if-no-files-found: ignore
