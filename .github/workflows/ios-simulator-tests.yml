name: iOS Simulator Tests

on:
  workflow_dispatch:
  push:
    paths:
      - "SmartOilaKids/**"
      - "SmartOilaKidsTests/**"
      - "Shared/**"
      - "SmartOilaKidsUsageReportExtension/**"
      - "SmartOilaKidsScheduleMonitorExtension/**"
      - "SmartOilaKids.xcodeproj/**"
      - "project.yml"
      - "scripts/run_ios_tests.sh"
      - ".github/workflows/ios-simulator-tests.yml"
  pull_request:
    paths:
      - "SmartOilaKids/**"
      - "SmartOilaKidsTests/**"
      - "Shared/**"
      - "SmartOilaKidsUsageReportExtension/**"
      - "SmartOilaKidsScheduleMonitorExtension/**"
      - "SmartOilaKids.xcodeproj/**"
      - "project.yml"
      - "scripts/run_ios_tests.sh"
      - ".github/workflows/ios-simulator-tests.yml"

concurrency:
  group: ios-simulator-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-simulator-tests:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Xcode Version
        run: xcodebuild -version

      - name: List Available iOS Simulators
        run: xcrun simctl list devices available

      - name: Run SmartOilaKids Simulator Tests
        run: ./scripts/run_ios_tests.sh

      - name: Upload Xcode Result Bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartoila-kids-xcresult
          path: .build/test-results/SmartOilaKids.xcresult
          if-no-files-found: ignore

      - name: Upload Xcodebuild Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartoila-kids-xcodebuild-log
          path: .build/test-results/ios-tests.log
          if-no-files-found: ignore
