# ⚠️ REFERENCE-ONLY MANIFEST — DO NOT RUN `xcodegen` AGAINST THIS FILE. ⚠️
# The checked-in SmartOilaKids.xcodeproj is the canonical, hand-maintained project. This spec
# describes ONLY the app target — it omits SmartOilaKidsTests and both Screen Time app-extension
# targets (SmartOilaKidsScheduleMonitorExtension, SmartOilaKidsUsageReportExtension). Regenerating
# from it would SILENTLY replace the 4-target project with a 1-target one that can't run tests or
# ship the extensions. Restore full parity here before this file is ever used to generate.
name: SmartOilaKids
options:
  minimumXcodeGenVersion: 2.40.0
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.10
    TARGETED_DEVICE_FAMILY: "1,2"

schemes:
  SmartOilaKids:
    build:
      targets:
        SmartOilaKids: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  SmartOilaKids:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SmartOilaKids
      - path: Shared/ScreenTimeUsage
      - path: Shared/DeviceLockSchedule
      - path: Shared/DeviceAppLimits
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uz.smartoila.kids
        DEVELOPMENT_TEAM: 3TWN5NW4BL
        INFOPLIST_FILE: SmartOilaKids/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SmartOilaKids/Resources/SmartOilaKids.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Bolajon360
        CURRENT_PROJECT_VERSION: 6
        MARKETING_VERSION: "1.1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
